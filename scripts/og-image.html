<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 630px;
      background: #F5F2EE;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 80px;
      position: relative;
    }

    /* Subtle top accent line */
    .accent-line {
      position: absolute;
      top: 0;
      left: 80px;
      right: 80px;
      height: 3px;
      background: #1A1A1A;
    }

    /* Muted label top-right */
    .label {
      position: absolute;
      top: 48px;
      right: 80px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #A39E99;
    }

    .name {
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: 96px;
      line-height: 1.0;
      color: #1A1A1A;
      letter-spacing: -0.01em;
      margin-bottom: 28px;
    }

    .tagline {
      font-family: 'DM Sans', sans-serif;
      font-size: 22px;
      line-height: 1.6;
      color: #6B6560;
      max-width: 680px;
    }

    /* Divider */
    .divider {
      width: 48px;
      height: 1px;
      background: #E5E0DA;
      margin: 32px 0;
    }

    .domain {
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #A39E99;
    }

    /* Subtle bottom border */
    .bottom-line {
      position: absolute;
      bottom: 0;
      left: 80px;
      right: 80px;
      height: 1px;
      background: #E5E0DA;
    }
  </style>
</head>
<body>
  <div class="accent-line"></div>
  <div class="label">Frontend Developer &middot; Buenos Aires</div>

  <h1 class="name">Andrea López<br>Palomeque</h1>
  <p class="tagline">I build digital spaces for people who care deeply about their craft.</p>

  <div class="divider"></div>
  <p class="domain">andrealopezpalomeque.dev</p>

  <div class="bottom-line"></div>
</body>
</html>
